<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Companion · choda-deck</title>

  <!--
    Theme boot — apply 'dark' class before Tailwind paints, to avoid FOUC.
    Source priority: localStorage 'theme' (light|dark) → prefers-color-scheme.
  -->
  <script>
    (function () {
      var stored = null;
      try { stored = localStorage.getItem('theme'); } catch (e) {}
      var systemDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      var dark = stored === 'dark' || (stored !== 'light' && systemDark);
      if (dark) document.documentElement.classList.add('dark');
    })();
  </script>

  <!-- Tailwind CDN with typography plugin, class-based dark mode -->
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>

  <!-- Tabler outline icons — NEVER -filled suffix -->
  <link rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.5.0/dist/tabler-icons.min.css" />

  <!-- marked.js pinned post Gate A -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>

  <!-- DOMPurify for XSS sanitize chain: marked.parse → DOMPurify.sanitize. Kept by deliberate decision (task TASK-806): companion ingests real task bodies + run reports from disk, marked alone does not sanitize. -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.3/purify.min.js"></script>

  <style>
    :root { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
    .mono { font-family: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, monospace; }
    .spin { animation: companion-spin 1s linear infinite; }
    @keyframes companion-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="bg-white dark:bg-zinc-900 text-zinc-900 dark:text-zinc-100 min-h-screen">

<!-- Tab strip — sticky 48px -->
<header class="sticky top-0 z-30 bg-white/95 dark:bg-zinc-900/95 backdrop-blur border-b border-zinc-200 dark:border-zinc-700">
  <div class="max-w-[1024px] mx-auto px-4 md:px-6">
    <nav class="flex items-center h-12 gap-1" role="tablist">
      <a id="tab-queue" href="#/queue" data-tab="queue" role="tab"
         class="inline-flex items-center gap-1 h-12 px-3 text-sm border-b-2 border-transparent text-zinc-500">
        <i class="ti ti-list text-base" aria-hidden="true"></i><span>Queue</span>
        <span data-badge="queue" class="ml-1 hidden mono text-[11px] px-1.5 py-px rounded-full bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-300"></span>
      </a>
      <a id="tab-tasks" href="#/tasks" data-tab="tasks" role="tab"
         class="inline-flex items-center gap-1 h-12 px-3 text-sm border-b-2 border-transparent text-zinc-500">
        <i class="ti ti-checklist text-base" aria-hidden="true"></i><span>Tasks</span>
        <span data-badge="tasks" class="ml-1 hidden mono text-[11px] px-1.5 py-px rounded-full bg-zinc-100 dark:bg-zinc-800 text-zinc-600 dark:text-zinc-300"></span>
      </a>
      <div class="ml-auto flex items-center gap-3 text-zinc-400">
        <span id="sse-status" class="hidden items-center gap-1 text-[12px]" title="Reconnecting to live event stream…">
          <i class="ti ti-refresh spin" aria-hidden="true"></i>
        </span>
        <span id="server-url" class="text-[12px] mono hidden md:inline"></span>
      </div>
    </nav>
  </div>
</header>

<!-- Content area — max-w-[1024px], page-level scroll only -->
<main id="view" class="max-w-[1024px] mx-auto px-4 md:px-6 py-4 md:py-6" aria-live="polite"></main>

<script>
// ── Helpers ─────────────────────────────────────────────────────────────────

function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function statusIcon(status) {
  const k = String(status ?? '').toUpperCase().replace(/-/g, '_');
  const m = {
    TODO:            { i: 'ti-clock',       c: 'text-zinc-500' },
    QUEUED:          { i: 'ti-clock',       c: 'text-zinc-500' },
    READY:           { i: 'ti-check',       c: 'text-zinc-500' },
    IN_PROGRESS:     { i: 'ti-player-play', c: 'text-blue-600 dark:text-blue-400' },
    RUNNING:         { i: 'ti-player-play', c: 'text-blue-600 dark:text-blue-400' },
    DONE:            { i: 'ti-check',       c: 'text-green-600 dark:text-green-400' },
    FINISHED:        { i: 'ti-check',       c: 'text-green-600 dark:text-green-400' },
    SUCCESS:         { i: 'ti-check',       c: 'text-green-600 dark:text-green-400' },
    MERGED:          { i: 'ti-check',       c: 'text-green-600 dark:text-green-400' },
    CANCELLED:       { i: 'ti-x',           c: 'text-zinc-400' },
    FAILED:          { i: 'ti-x',           c: 'text-red-600 dark:text-red-400' },
    PREFLIGHT_FAILED:{ i: 'ti-x',           c: 'text-red-600 dark:text-red-400' },
  };
  const d = m[k] ?? { i: 'ti-clock', c: 'text-zinc-500' };
  return `<i class="ti ${d.i} ${d.c} text-base leading-none flex-shrink-0" aria-hidden="true"></i>`;
}

function relativeTime(ts) {
  if (!ts) return '';
  const diffMs  = Date.now() - new Date(ts).getTime();
  const diffSec = Math.floor(diffMs / 1000);
  if (diffSec < 60) return 'just now';
  const diffMin = Math.floor(diffSec / 60);
  if (diffMin < 60) return `${diffMin}m ago`;
  const diffHr  = Math.floor(diffMin / 60);
  if (diffHr < 24) return `${diffHr}h ago`;
  const diffDay = Math.floor(diffHr / 24);
  if (diffDay < 2) return 'yesterday';
  if (diffDay < 7) return `${diffDay}d ago`;
  return new Date(ts).toISOString().slice(0, 10);
}

function priorityDot(priority) {
  const p = String(priority ?? '').toLowerCase();
  const colors = { critical: 'bg-red-500', high: 'bg-amber-500', medium: 'bg-zinc-400' };
  const cls = colors[p];
  return cls
    ? `<span class="inline-block w-1.5 h-1.5 rounded-full flex-shrink-0 ${cls}" aria-hidden="true"></span>`
    : '';
}

function labelPills(labelsRaw) {
  if (!labelsRaw) return '';
  const labels = String(labelsRaw).split(',').map(l => l.trim()).filter(Boolean);
  if (!labels.length) return '';
  const pillCls = 'text-[12px] px-2 py-px rounded-full bg-zinc-100 dark:bg-zinc-800 text-zinc-700 dark:text-zinc-300';
  const visible = labels.slice(0, 2).map(l => `<span class="${pillCls}">${esc(l)}</span>`);
  const extra = labels.length - 2;
  if (extra > 0) visible.push(`<span class="${pillCls}">+${extra}</span>`);
  return visible.join(' ');
}

function renderMarkdown(md) {
  const html = window.marked ? window.marked.parse(String(md ?? '')) : esc(md ?? '');
  return window.DOMPurify
    ? window.DOMPurify.sanitize(html, { USE_PROFILES: { html: true } })
    : html;
}

function errorMsg(msg) {
  return `<p class="py-8 text-sm text-center text-zinc-500 dark:text-zinc-400">${esc(msg)}</p>`;
}

function formatDuration(ms) {
  if (!ms || ms < 0) return '';
  const s = Math.floor(ms / 1000);
  if (s < 60) return `${s}s`;
  return `${Math.floor(s / 60)}m ${String(s % 60).padStart(2, '0')}s`;
}

// XSS sanitize assertion — zero <script> tags + zero onerror attrs after render
function __assertSanitize__() {
  if (!window.DOMPurify || !window.marked) return;
  const raw = '<script>alert(1)<\/script><img src=x onerror=alert(1)>';
  const html = DOMPurify.sanitize(marked.parse(raw), { USE_PROFILES: { html: true } });
  const tmp = document.createElement('div');
  tmp.innerHTML = html;
  console.assert(
    tmp.querySelectorAll('script').length === 0 &&
    tmp.querySelectorAll('[onerror]').length === 0,
    '[companion] XSS sanitize check failed — review DOMPurify version'
  );
}

// ── SSE live state ───────────────────────────────────────────────────────────
//
// Single active run at a time (UI.md). State is mutated by EventSource handlers
// and read by activeRunCard() + setTitle(). When sseState.active is non-null,
// document.title is prefixed `(1) Companion`.

const sseState = {
  active: null,         // { queueRunId, taskCount, startedAt, totalCostUsd, tasks: Map }
  eventSource: null,
};

let currentTitleSuffix = '';

function setTitle(suffix) {
  currentTitleSuffix = suffix || '';
  const base = sseState.active ? '(1) Companion' : 'Companion';
  document.title = currentTitleSuffix ? `${base} · ${currentTitleSuffix}` : base;
}

function applySseEvent(evt) {
  if (!sseState.active) return;
  if (evt.event === 'task.started') {
    sseState.active.tasks.set(evt.taskId, {
      status: 'IN-PROGRESS',
      startedAt: Date.now(),
    });
  } else if (evt.event === 'task.finished') {
    const prev = sseState.active.tasks.get(evt.taskId) ?? {};
    sseState.active.tasks.set(evt.taskId, {
      ...prev,
      status: evt.outcome || 'DONE',
      costUsd: (prev.costUsd || 0) + (evt.costUsd || 0),
      durationMs: evt.durationMs,
    });
    sseState.active.totalCostUsd =
      (sseState.active.totalCostUsd || 0) + (evt.costUsd || 0);
  } else if (evt.event === 'run.finished' || evt.event === 'run.failed') {
    sseState.active = null;
  }
}

function activeRunCard() {
  if (!sseState.active) return '';
  const { queueRunId, totalCostUsd, startedAt, tasks } = sseState.active;
  const elapsedMs = Date.now() - new Date(startedAt).getTime();
  const taskRows = [...tasks.entries()].map(([taskId, t]) => `
    <div class="flex items-center gap-3 px-4 py-2 border-t border-blue-200/60 dark:border-blue-800/40">
      ${statusIcon(t.status)}
      <span class="mono text-[13px] text-zinc-700 dark:text-zinc-300 truncate flex-1">${esc(taskId)}</span>
      ${t.costUsd != null ? `<span class="mono text-[12px] text-zinc-500">$${Number(t.costUsd).toFixed(2)}</span>` : ''}
      ${t.durationMs ? `<span class="text-[12px] text-zinc-500">${esc(formatDuration(t.durationMs))}</span>` : ''}
    </div>`).join('');

  return `
    <div data-active-run="${esc(queueRunId)}"
         class="rounded-lg border-2 border-blue-500/60 dark:border-blue-400/50 bg-blue-50/40 dark:bg-blue-900/10 mb-4 overflow-hidden">
      <div class="flex items-center gap-3 px-4 py-3">
        <i class="ti ti-player-play text-blue-600 dark:text-blue-400 text-base flex-shrink-0" aria-hidden="true"></i>
        <span class="mono text-[13px] font-medium truncate">${esc(queueRunId)}</span>
        <span class="text-[12px] text-blue-700 dark:text-blue-300 px-2 py-px rounded-full bg-blue-100 dark:bg-blue-900/40 flex-shrink-0">active</span>
        <span class="flex-1"></span>
        <span class="mono text-[12px] text-zinc-500 flex-shrink-0">$${Number(totalCostUsd || 0).toFixed(2)}</span>
        <span class="text-[12px] text-zinc-500 flex-shrink-0">${esc(formatDuration(elapsedMs))}</span>
      </div>
      ${taskRows}
    </div>`;
}

function rerenderActiveIfQueueList() {
  const { parts } = parseRoute(window.location.hash);
  const [tab, id] = parts;
  const isQueueList = (!tab || tab === 'queue') && !id;
  if (!isQueueList) return;

  const view = document.getElementById('view');
  if (!view) return;
  const existing = view.querySelector('[data-active-run]');
  const html = activeRunCard();

  if (existing && html) {
    existing.outerHTML = html;
  } else if (existing && !html) {
    existing.remove();
  } else if (!existing && html) {
    view.insertAdjacentHTML('afterbegin', html);
  }
}

function startSse() {
  if (sseState.eventSource) return;
  const es = new EventSource('/api/queue/live');
  sseState.eventSource = es;
  updateSseIndicator();
  es.addEventListener('open', updateSseIndicator);

  es.addEventListener('run.active', (e) => {
    let data;
    try { data = JSON.parse(e.data); } catch { return; }
    sseState.active = {
      queueRunId: data.queueRunId,
      taskCount: data.taskCount,
      startedAt: data.startedAt,
      totalCostUsd: 0,
      tasks: new Map(),
    };
    setTitle(currentTitleSuffix);
    setTabBadge('queue', 1);
    rerenderActiveIfQueueList();
  });

  es.addEventListener('tick', (e) => {
    let evt;
    try { evt = JSON.parse(e.data); } catch { return; }
    const wasActive = !!sseState.active;
    applySseEvent(evt);
    setTitle(currentTitleSuffix);
    if (wasActive && !sseState.active) {
      // terminal — refresh full Queue list if on it
      setTabBadge('queue', 0);
      const { parts, params } = parseRoute(window.location.hash);
      const [tab, id] = parts;
      if ((!tab || tab === 'queue') && !id) showQueueList(params);
    } else {
      rerenderActiveIfQueueList();
    }
  });

  // EventSource auto-reconnects natively (~3s). Silent per UI.md — no toast/banner.
  // The reconnect indicator (#sse-status) is the only visible cue.
  es.addEventListener('error', updateSseIndicator);
}

// ── Tab strip: active state + count badges + SSE indicator ──────────────────

const TAB_ACTIVE   = 'border-zinc-900 dark:border-zinc-100 font-medium text-zinc-900 dark:text-zinc-100';
const TAB_INACTIVE = 'border-transparent text-zinc-500';

function setActiveTab(name) {
  ['queue', 'tasks'].forEach(id => {
    const el = document.getElementById('tab-' + id);
    if (!el) return;
    if (id === name) {
      TAB_INACTIVE.split(' ').forEach(c => el.classList.remove(c));
      TAB_ACTIVE.split(' ').forEach(c => el.classList.add(c));
    } else {
      TAB_ACTIVE.split(' ').forEach(c => el.classList.remove(c));
      TAB_INACTIVE.split(' ').forEach(c => el.classList.add(c));
    }
  });
}

// Tab count badges — updated by list views after fetch.
const tabCounts = { queue: 0, tasks: 0 };
function setTabBadge(name, n) {
  tabCounts[name] = n;
  const el = document.querySelector(`[data-badge="${name}"]`);
  if (!el) return;
  if (n > 0) {
    el.textContent = '(' + n + ')';
    el.classList.remove('hidden');
  } else {
    el.textContent = '';
    el.classList.add('hidden');
  }
}

// SSE indicator: visible while EventSource is connecting or closed.
function updateSseIndicator() {
  const el = document.getElementById('sse-status');
  if (!el) return;
  const rs = sseState.eventSource && sseState.eventSource.readyState;
  const connected = rs === 1; // EventSource.OPEN
  el.classList.toggle('hidden', connected);
  el.classList.toggle('inline-flex', !connected);
}

function setServerUrlBadge() {
  const el = document.getElementById('server-url');
  if (el) el.textContent = location.host;
}

// ── Queue views ──────────────────────────────────────────────────────────────

const ALL_QUEUE_STATUSES = ['running', 'finished', 'failed'];
let activeQueueFilter = [...ALL_QUEUE_STATUSES];

function buildQueueHash() {
  // Default = all selected; omit param for clean URL
  if (activeQueueFilter.length === ALL_QUEUE_STATUSES.length) return '#/queue';
  return `#/queue?status=${activeQueueFilter.join(',')}`;
}

function queueChipStrip() {
  return `<div class="flex gap-2 flex-wrap mb-4" role="group" aria-label="Filter queue by status">
    ${ALL_QUEUE_STATUSES.map(s => {
      const on = activeQueueFilter.includes(s);
      const cls = on
        ? 'px-3 py-1 rounded-full text-[12px] font-medium cursor-pointer select-none bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900'
        : 'px-3 py-1 rounded-full text-[12px] cursor-pointer select-none bg-zinc-100 dark:bg-zinc-800 text-zinc-700 dark:text-zinc-300 hover:bg-zinc-200 dark:hover:bg-zinc-700';
      return `<button class="${cls}" data-queue-status="${esc(s)}" type="button">${esc(s)}</button>`;
    }).join('')}
  </div>`;
}

function wireQueueChips() {
  document.getElementById('view').querySelectorAll('button[data-queue-status]').forEach(btn => {
    btn.addEventListener('click', () => {
      const s = btn.dataset.queueStatus;
      activeQueueFilter = activeQueueFilter.includes(s)
        ? activeQueueFilter.filter(x => x !== s)
        : [...activeQueueFilter, s];
      history.pushState(null, '', buildQueueHash());
      showQueueList(null);
    });
  });
}

async function showQueueList(params) {
  setActiveTab('queue');
  setTitle('Queue');
  const view = document.getElementById('view');

  if (params && params.status !== undefined) {
    activeQueueFilter = params.status
      ? params.status.split(',').map(s => s.trim()).filter(Boolean)
      : [];
  }

  view.innerHTML = activeRunCard() + queueChipStrip() + errorMsg('Loading...');
  wireQueueChips();

  let runs;
  try {
    const res = await fetch('/api/queue');
    if (!res.ok) throw new Error(await res.text());
    runs = await res.json();
  } catch (e) {
    view.innerHTML = activeRunCard() + queueChipStrip() + errorMsg(`Cannot read queue. ${e.message}`);
    wireQueueChips();
    return;
  }

  setTabBadge('queue', sseState.active ? 1 : runs.filter(r => r.status === 'running').length);

  // Active run renders as the top expanded card — drop it from the list below.
  const activeId = sseState.active?.queueRunId;
  let filtered = activeId ? runs.filter(r => r.id !== activeId) : runs;
  // Apply client-side status filter
  if (activeQueueFilter.length !== ALL_QUEUE_STATUSES.length) {
    filtered = filtered.filter(r => activeQueueFilter.includes(r.status));
  }

  if (!filtered.length) {
    const msg = activeQueueFilter.length === 0
      ? 'No filter selected.'
      : activeQueueFilter.length === ALL_QUEUE_STATUSES.length
        ? 'No queue runs yet.'
        : `No ${activeQueueFilter.join('/')} runs.`;
    view.innerHTML = activeRunCard() + queueChipStrip() + (sseState.active && activeQueueFilter.length === ALL_QUEUE_STATUSES.length ? '' : errorMsg(msg));
    wireQueueChips();
    return;
  }

  const rows = filtered.map(r => `
    <a href="#/queue/${esc(r.id)}"
       class="flex items-center gap-3 px-4 py-3 border-b border-zinc-100 dark:border-zinc-800 last:border-0 hover:bg-zinc-50 dark:hover:bg-zinc-800 no-underline">
      ${statusIcon(r.status)}
      <span class="mono text-[13px] text-zinc-600 dark:text-zinc-400 w-52 truncate flex-shrink-0">${esc(r.id)}</span>
      <span class="flex items-center gap-2 flex-1 min-w-0 text-[12px] text-zinc-500">
        ${r.totalCostUsd ? `<span class="mono">$${Number(r.totalCostUsd).toFixed(2)}</span>` : ''}
        ${r.durationMs ? `<span>${esc(formatDuration(r.durationMs))}</span>` : ''}
        <span>${r.taskCount} task${r.taskCount !== 1 ? 's' : ''}</span>
      </span>
      <span class="text-[12px] text-zinc-400 flex-shrink-0">${esc(relativeTime(r.finishedAt))}</span>
      <i class="ti ti-chevron-right text-zinc-400 flex-shrink-0" aria-hidden="true"></i>
    </a>`).join('');

  view.innerHTML = activeRunCard()
    + queueChipStrip()
    + `<div class="rounded-lg border border-zinc-200 dark:border-zinc-700 overflow-hidden">${rows}</div>`;
  wireQueueChips();
}

async function showQueueDetail(id) {
  setActiveTab('queue');
  setTitle(id);
  const view = document.getElementById('view');
  view.innerHTML = errorMsg('Loading...');

  let data;
  try {
    const res = await fetch(`/api/queue/${encodeURIComponent(id)}`);
    if (!res.ok) throw new Error(await res.text());
    data = await res.json();
  } catch (e) {
    view.innerHTML = errorMsg(`Cannot read ${id}. ${e.message}`);
    return;
  }

  const meta = data.meta ?? {};
  const status = meta.halted ? 'failed' : (meta.endedAt ? 'finished' : 'running');
  const cost = meta.totalCostUsd ? `$${Number(meta.totalCostUsd).toFixed(2)}` : '';
  const startMs = meta.startedAt ? new Date(meta.startedAt).getTime() : 0;
  const endMs   = meta.endedAt   ? new Date(meta.endedAt).getTime()   : Date.now();
  const dur = formatDuration(endMs - startMs);

  const tasks = Array.isArray(meta.taskOutcomes) ? meta.taskOutcomes : [];
  const taskRows = tasks.length
    ? tasks.map(t => `
        <div class="border-t border-zinc-200 dark:border-zinc-700">
          <div class="flex items-center gap-3 px-3 py-2">
            ${statusIcon(t.outcome)}
            <span class="mono text-[13px] text-zinc-700 dark:text-zinc-300 truncate flex-1">${esc(t.taskId)}</span>
            <span class="text-[12px] text-zinc-500 flex-shrink-0">${esc(t.outcome ?? '')}</span>
            ${t.costUsd != null
              ? `<span class="mono text-[12px] text-zinc-500 flex-shrink-0">$${Number(t.costUsd).toFixed(3)}</span>`
              : ''}
          </div>
          ${t.reason && t.outcome !== 'DONE'
            ? `<div class="px-3 pb-2 text-[12px] text-zinc-500 dark:text-zinc-400 break-words">${esc(t.reason)}</div>`
            : ''}
        </div>`).join('')
    : '';

  view.innerHTML = `
    <a href="#/queue"
       class="inline-flex items-center gap-1 text-sm text-zinc-500 hover:text-zinc-700 dark:hover:text-zinc-300 mb-4 no-underline">
      <i class="ti ti-chevron-left" aria-hidden="true"></i> Queue
    </a>
    <div class="flex items-center gap-3 mb-6 flex-wrap">
      ${statusIcon(status)}
      <span class="mono text-sm font-medium">${esc(id)}</span>
      ${cost ? `<span class="mono text-[12px] text-zinc-500">${esc(cost)}</span>` : ''}
      ${dur  ? `<span class="text-[12px] text-zinc-500">${esc(dur)}</span>` : ''}
      <span class="text-[12px] text-zinc-400 ml-auto">${esc(relativeTime(meta.endedAt || meta.startedAt))}</span>
    </div>
    ${taskRows
      ? `<div class="rounded-lg border border-zinc-200 dark:border-zinc-700 overflow-hidden mb-6">
           <div class="px-3 py-2 text-[12px] font-medium text-zinc-500 dark:text-zinc-400">Tasks (${tasks.length})</div>
           ${taskRows}
         </div>`
      : ''}
    ${data.report
      ? `<div class="prose prose-sm dark:prose-invert max-w-none">${renderMarkdown(data.report)}</div>`
      : errorMsg('No report available.')}`;
}

// ── Tasks views ──────────────────────────────────────────────────────────────

const ALL_STATUSES   = ['IN-PROGRESS', 'READY', 'TODO', 'FAILED', 'DONE', 'CANCELLED'];
const DEFAULT_FILTER = ['READY', 'IN-PROGRESS', 'TODO', 'FAILED'];
const ALL_LABELS     = ['auto-safe'];
const STATUS_ORDER   = { 'IN-PROGRESS': 0, READY: 1, TODO: 2, FAILED: 3, DONE: 4, CANCELLED: 5 };
const PRIORITY_ORD   = { critical: 0, high: 1, medium: 2, low: 3 };

let activeFilter = [...DEFAULT_FILTER];
let activeLabels = [];
let activeQuery = '';
let queryDebounceTimer = null;

function buildTasksHash() {
  const qs = [`status=${activeFilter.join(',')}`];
  if (activeLabels.length) qs.push(`labels=${activeLabels.join(',')}`);
  if (activeQuery)         qs.push(`query=${encodeURIComponent(activeQuery)}`);
  return `#/tasks?${qs.join('&')}`;
}

function searchBoxStrip() {
  const hasValue = activeQuery !== '';
  return `<div class="relative mb-3">
    <i class="ti ti-search absolute left-3 top-1/2 -translate-y-1/2 text-zinc-400 text-base" aria-hidden="true"></i>
    <input id="task-search" type="text" autocomplete="off" spellcheck="false"
      placeholder="Search by id or title…"
      value="${esc(activeQuery)}"
      class="w-full pl-9 pr-9 py-2 text-sm rounded bg-zinc-50 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 focus:outline-none focus:border-zinc-400 dark:focus:border-zinc-500" />
    ${hasValue ? `<button id="task-search-clear" type="button" aria-label="Clear search"
      class="absolute right-2 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-zinc-700 dark:hover:text-zinc-200 p-1">
      <i class="ti ti-x text-base" aria-hidden="true"></i>
    </button>` : ''}
  </div>`;
}

function filterChipStrip() {
  const statusRow = `<div class="flex gap-2 flex-wrap mb-2" role="group" aria-label="Filter by status">
    ${ALL_STATUSES.map(s => {
      const on = activeFilter.includes(s);
      const cls = on
        ? 'px-3 py-1 rounded-full text-[12px] font-medium cursor-pointer select-none bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900'
        : 'px-3 py-1 rounded-full text-[12px] cursor-pointer select-none bg-zinc-100 dark:bg-zinc-800 text-zinc-700 dark:text-zinc-300 hover:bg-zinc-200 dark:hover:bg-zinc-700';
      return `<button class="${cls}" data-status="${esc(s)}" type="button">${esc(s.toLowerCase().replace('-', ' '))}</button>`;
    }).join('')}
  </div>`;
  const labelRow = `<div class="flex gap-2 flex-wrap mb-4" role="group" aria-label="Filter by label">
    ${ALL_LABELS.map(l => {
      const on = activeLabels.includes(l);
      const cls = on
        ? 'px-3 py-1 rounded-full text-[12px] font-medium cursor-pointer select-none bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900'
        : 'px-3 py-1 rounded-full text-[12px] cursor-pointer select-none bg-zinc-100 dark:bg-zinc-800 text-zinc-700 dark:text-zinc-300 hover:bg-zinc-200 dark:hover:bg-zinc-700';
      return `<button class="${cls}" data-label="${esc(l)}" type="button">${esc(l)}</button>`;
    }).join('')}
  </div>`;
  return searchBoxStrip() + statusRow + labelRow;
}

function wireChips() {
  const view = document.getElementById('view');
  view.querySelectorAll('button[data-status]').forEach(btn => {
    btn.addEventListener('click', () => {
      const s = btn.dataset.status;
      activeFilter = activeFilter.includes(s)
        ? activeFilter.filter(x => x !== s)
        : [...activeFilter, s];
      // pushState + manual render — avoids hashchange double-fire
      history.pushState(null, '', buildTasksHash());
      showTasksList(null);
    });
  });
  view.querySelectorAll('button[data-label]').forEach(btn => {
    btn.addEventListener('click', () => {
      const l = btn.dataset.label;
      activeLabels = activeLabels.includes(l)
        ? activeLabels.filter(x => x !== l)
        : [...activeLabels, l];
      history.pushState(null, '', buildTasksHash());
      showTasksList(null);
    });
  });

  const searchInput = view.querySelector('#task-search');
  if (searchInput) {
    // Preserve focus + caret across re-render — relevant for typing while debouncing.
    if (searchInput.value === activeQuery) {
      const len = activeQuery.length;
      searchInput.focus();
      // Defer to next tick — Chrome resets selection on .focus() of newly inserted node.
      requestAnimationFrame(() => searchInput.setSelectionRange(len, len));
    }
    searchInput.addEventListener('input', (e) => {
      const next = e.target.value;
      activeQuery = next;
      if (queryDebounceTimer) clearTimeout(queryDebounceTimer);
      queryDebounceTimer = setTimeout(() => {
        history.pushState(null, '', buildTasksHash());
        showTasksList(null);
      }, 250);
    });
  }
  const clearBtn = view.querySelector('#task-search-clear');
  if (clearBtn) {
    clearBtn.addEventListener('click', () => {
      activeQuery = '';
      if (queryDebounceTimer) clearTimeout(queryDebounceTimer);
      history.pushState(null, '', buildTasksHash());
      showTasksList(null);
    });
  }
}

async function showTasksList(params) {
  setActiveTab('tasks');
  setTitle('Tasks');
  const view = document.getElementById('view');

  if (params && params.status) {
    activeFilter = params.status.split(',').map(s => s.trim()).filter(Boolean);
  }
  if (params && params.labels !== undefined) {
    activeLabels = params.labels
      ? params.labels.split(',').map(l => l.trim()).filter(Boolean)
      : [];
  }
  if (params && params.query !== undefined) {
    activeQuery = params.query;
  }

  view.innerHTML = filterChipStrip() + errorMsg('Loading...');
  wireChips();

  let tasks;
  try {
    let url = `/api/tasks?status=${encodeURIComponent(activeFilter.join(','))}`;
    if (activeLabels.length) {
      url += `&labels=${encodeURIComponent(activeLabels.join(','))}`;
    }
    if (activeQuery) {
      url += `&query=${encodeURIComponent(activeQuery)}`;
    }
    const res = await fetch(url);
    if (!res.ok) {
      if (res.status === 503) {
        view.innerHTML = filterChipStrip() + errorMsg('Database busy. Retrying...');
        wireChips();
        setTimeout(() => showTasksList(null), 3000);
        return;
      }
      throw new Error(await res.text());
    }
    tasks = await res.json();
  } catch (e) {
    view.innerHTML = filterChipStrip() + errorMsg('Server error. See log.');
    wireChips();
    return;
  }

  // Sort: group order → priority desc → updatedAt desc
  tasks.sort((a, b) => {
    const go = (STATUS_ORDER[a.status] ?? 99) - (STATUS_ORDER[b.status] ?? 99);
    if (go) return go;
    const po = (PRIORITY_ORD[(a.priority ?? '').toLowerCase()] ?? 99)
             - (PRIORITY_ORD[(b.priority ?? '').toLowerCase()] ?? 99);
    if (po) return po;
    return (b.updated_at ?? '').localeCompare(a.updated_at ?? '');
  });

  setTabBadge('tasks', tasks.filter(t => t.status === 'IN-PROGRESS' || t.status === 'READY').length);

  if (!tasks.length) {
    const msg = activeQuery
      ? `No match for "${esc(activeQuery)}". Adjust filters or clear search.`
      : 'No tasks. Adjust filters.';
    view.innerHTML = filterChipStrip() + errorMsg(msg);
    wireChips();
    return;
  }

  const rows = tasks.map(t => {
    const title = String(t.title ?? t.id ?? '');
    const trunc = title.slice(0, 60);
    return `
      <a href="#/tasks/${esc(t.id)}"
         class="flex items-center gap-3 px-4 py-3 border-b border-zinc-100 dark:border-zinc-800 last:border-0 hover:bg-zinc-50 dark:hover:bg-zinc-800 no-underline">
        ${statusIcon(t.status)}
        <span class="mono text-[13px] text-zinc-600 dark:text-zinc-400 w-24 truncate flex-shrink-0">${esc(t.id)}</span>
        <span class="flex-1 text-[14px] truncate">${esc(trunc)}${title.length > 60 ? '…' : ''}</span>
        <span class="flex items-center gap-1.5 flex-shrink-0">
          ${labelPills(t.labels)}${priorityDot(t.priority)}
        </span>
        <span class="text-[12px] text-zinc-400 flex-shrink-0">${esc(relativeTime(t.updated_at || t.created_at))}</span>
        <i class="ti ti-chevron-right text-zinc-400 flex-shrink-0" aria-hidden="true"></i>
      </a>`;
  }).join('');

  view.innerHTML = filterChipStrip()
    + `<div class="rounded-lg border border-zinc-200 dark:border-zinc-700 overflow-hidden">${rows}</div>`;
  wireChips();
}

async function showTaskDetail(id) {
  setActiveTab('tasks');
  setTitle(id);
  const view = document.getElementById('view');
  view.innerHTML = errorMsg('Loading...');

  let task;
  try {
    const res = await fetch(`/api/tasks/${encodeURIComponent(id)}`);
    if (res.status === 404) throw new Error(`Task not found: ${id}`);
    if (!res.ok) throw new Error(await res.text());
    task = await res.json();
  } catch (e) {
    view.innerHTML = errorMsg(`Cannot read ${id}. ${e.message}`);
    return;
  }

  view.innerHTML = `
    <a href="#/tasks"
       class="inline-flex items-center gap-1 text-sm text-zinc-500 hover:text-zinc-700 dark:hover:text-zinc-300 mb-4 no-underline">
      <i class="ti ti-chevron-left" aria-hidden="true"></i> Tasks
    </a>
    <div class="flex items-center gap-3 mb-6 flex-wrap">
      ${statusIcon(task.status)}
      <span class="mono text-sm font-medium">${esc(task.id)}</span>
      ${task.title ? `<span class="text-sm flex-1 min-w-0 truncate">${esc(task.title.slice(0, 80))}</span>` : ''}
      ${priorityDot(task.priority)}
      ${labelPills(task.labels)}
      <span class="text-[12px] text-zinc-400 ml-auto">${esc(relativeTime(task.updated_at))}</span>
    </div>
    ${task.body
      ? `<div class="prose prose-sm dark:prose-invert max-w-none">${renderMarkdown(task.body)}</div>`
      : errorMsg('No body.')}
    <div id="run-panel" class="mt-6"></div>`;

  renderRunPanel(task);
}

// ── Run in queue ─────────────────────────────────────────────────────────────
//
// Mirrors mobile's Run-in-queue button on task detail. Only enabled when
// task.status === 'READY'. Picker remembers last project/workspace via
// localStorage. POST /api/queue/start → 202 → navigate to Queue tab.

const RUN_STORAGE_KEY = 'companion:lastRunTarget';

function loadLastRunTarget() {
  try {
    const raw = localStorage.getItem(RUN_STORAGE_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch {
    return {};
  }
}
function saveLastRunTarget(t) {
  try { localStorage.setItem(RUN_STORAGE_KEY, JSON.stringify(t)); } catch {}
}

async function renderRunPanel(task) {
  const panel = document.getElementById('run-panel');
  if (!panel) return;

  if (task.status !== 'READY') {
    panel.innerHTML = `
      <div class="rounded-lg border border-zinc-200 dark:border-zinc-700 px-4 py-3 text-[12px] text-zinc-500">
        Only READY tasks can be queued. Current status: ${esc(task.status)}.
      </div>`;
    return;
  }

  // Fetch projects + workspaces; reuse last selection if compatible
  let projects = [];
  try {
    const res = await fetch('/api/projects');
    if (res.ok) projects = await res.json();
  } catch {}

  const last = loadLastRunTarget();
  // Prefer task.project_id if available; else last project; else first
  const preferredProjectId =
    (task.project_id && projects.find(p => p.id === task.project_id)?.id) ||
    (last.projectId && projects.find(p => p.id === last.projectId)?.id) ||
    projects[0]?.id ||
    '';

  panel.innerHTML = `
    <div class="rounded-lg border border-zinc-200 dark:border-zinc-700 p-4">
      <div class="flex items-center gap-2 mb-3">
        <i class="ti ti-player-play text-base text-zinc-500" aria-hidden="true"></i>
        <span class="text-sm font-medium">Run in queue</span>
      </div>
      ${projects.length === 0
        ? `<p class="text-[12px] text-zinc-500">No projects available — check server config.</p>`
        : `
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <label class="block">
            <span class="block text-[12px] text-zinc-500 mb-1">Project</span>
            <select id="run-project"
              class="w-full bg-zinc-50 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded px-2 py-1.5 text-sm">
              ${projects.map(p => `<option value="${esc(p.id)}"${p.id === preferredProjectId ? ' selected' : ''}>${esc(p.name || p.id)}</option>`).join('')}
            </select>
          </label>
          <label class="block">
            <span class="block text-[12px] text-zinc-500 mb-1">Workspace</span>
            <select id="run-workspace"
              class="w-full bg-zinc-50 dark:bg-zinc-800 border border-zinc-200 dark:border-zinc-700 rounded px-2 py-1.5 text-sm">
              <option>Loading…</option>
            </select>
          </label>
        </div>
        <div class="flex items-center gap-3 mt-4">
          <button id="run-start" type="button"
            class="px-3 py-1.5 rounded text-sm font-medium bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 disabled:opacity-50">
            Start
          </button>
          <span id="run-hint" class="text-[12px] text-zinc-500"></span>
        </div>`}
    </div>`;

  if (projects.length === 0) return;

  const projectSel = document.getElementById('run-project');
  const workspaceSel = document.getElementById('run-workspace');
  const startBtn = document.getElementById('run-start');
  const hintEl = document.getElementById('run-hint');
  // Panel could be torn down by intervening navigation before we wire handlers.
  if (!projectSel || !workspaceSel || !startBtn || !hintEl) return;

  async function loadWorkspaces(projectId) {
    workspaceSel.innerHTML = '<option>Loading…</option>';
    startBtn.disabled = true;
    let workspaces = [];
    try {
      const res = await fetch(`/api/workspaces?projectId=${encodeURIComponent(projectId)}`);
      if (res.ok) workspaces = (await res.json()).filter(w => !w.archived_at);
    } catch {}
    if (!workspaces.length) {
      workspaceSel.innerHTML = '<option value="">— no workspaces —</option>';
      startBtn.disabled = true;
      hintEl.textContent = 'Add a workspace via choda-tasks MCP first.';
      return;
    }
    const preferred =
      (last.projectId === projectId && last.workspaceId && workspaces.find(w => w.id === last.workspaceId)?.id) ||
      workspaces[0].id;
    workspaceSel.innerHTML = workspaces
      .map(w => `<option value="${esc(w.id)}"${w.id === preferred ? ' selected' : ''}>${esc(w.label || w.id)}</option>`)
      .join('');
    startBtn.disabled = false;
    hintEl.textContent = '';
  }

  projectSel.addEventListener('change', () => loadWorkspaces(projectSel.value));
  startBtn.addEventListener('click', async () => {
    const projectId = projectSel.value;
    const workspaceId = workspaceSel.value;
    if (!projectId || !workspaceId) return;
    startBtn.disabled = true;
    const original = startBtn.textContent;
    startBtn.textContent = 'Starting…';
    hintEl.textContent = '';
    try {
      const res = await fetch('/api/queue/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ taskId: task.id, projectId, workspaceId, source: 'web' }),
      });
      const text = await res.text();
      if (!res.ok) {
        let msg = text || `HTTP ${res.status}`;
        try { msg = (JSON.parse(text)?.error) ?? msg; } catch {}
        if (res.status === 409) msg = 'Already running or worktree exists — check Queue.';
        throw new Error(msg);
      }
      saveLastRunTarget({ projectId, workspaceId });
      history.pushState(null, '', '#/queue');
      route();
    } catch (e) {
      startBtn.disabled = false;
      startBtn.textContent = original;
      hintEl.textContent = e.message;
    }
  });

  if (preferredProjectId) await loadWorkspaces(preferredProjectId);
}

// ── Router ───────────────────────────────────────────────────────────────────

function parseRoute(hash) {
  const h = String(hash || '#/queue').replace(/^#\/?/, '');
  const [pathPart = '', qs = ''] = h.split('?');
  const parts = pathPart.split('/').filter(Boolean);
  const params = Object.fromEntries(
    qs.split('&').filter(Boolean).map(p => {
      const eq = p.indexOf('=');
      const k  = eq >= 0 ? p.slice(0, eq) : p;
      const v  = eq >= 0 ? p.slice(eq + 1) : '';
      return [decodeURIComponent(k), decodeURIComponent(v)];
    })
  );
  return { parts, params };
}

function route() {
  const { parts, params } = parseRoute(window.location.hash);
  const [tab, id] = parts;
  if (tab === 'tasks') {
    id ? showTaskDetail(id) : showTasksList(params);
  } else {
    // 'queue' or empty → queue
    id ? showQueueDetail(id) : showQueueList(params);
  }
}

window.addEventListener('hashchange', route);
window.addEventListener('popstate',   route);

window.addEventListener('DOMContentLoaded', () => {
  __assertSanitize__();
  setServerUrlBadge();
  if (!window.location.hash || window.location.hash === '#') {
    history.replaceState(null, '', '#/queue');
  }
  route();
  startSse();
});
</script>
