<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gate B — Hono SSE Windows client</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; max-width: 720px; margin: 24px auto; padding: 0 16px; }
    #counter { font-size: 28px; font-weight: 500; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
    #counter.pass { color: #16a34a; }
    #counter.fail { color: #dc2626; }
    #status { font-family: ui-monospace, Menlo, monospace; font-size: 13px; margin: 8px 0 16px; color: #71717a; }
    #log { font-family: ui-monospace, Menlo, monospace; font-size: 12px; max-height: 320px; overflow-y: auto; border: 1px solid #ccc; border-radius: 8px; padding: 8px 12px; list-style: none; margin: 0; }
    #log li { padding: 2px 0; border-bottom: 1px dashed #e4e4e7; }
    #log li:last-child { border-bottom: none; }
    #errors { color: #dc2626; font-family: ui-monospace, Menlo, monospace; font-size: 13px; margin-top: 12px; min-height: 1.4em; }
    @media (prefers-color-scheme: dark) {
      body { color: #e4e4e7; background: #09090b; }
      #log { background: #18181b; border-color: #3f3f46; }
      #log li { border-bottom-color: #3f3f46; }
      #status { color: #a1a1aa; }
    }
  </style>
</head>
<body>
  <h1>Gate B — Hono SSE keep-alive (TASK-738)</h1>
  <p>Expected: 30 events @ 3s intervals = ~90s total. Open DevTools Network panel to verify single long-running EventStream connection (no retry/reconnect).</p>
  <div id="counter">0 / 30</div>
  <div id="status">readyState: connecting…</div>
  <ul id="log"></ul>
  <div id="errors"></div>

  <script>
    const total = 30;
    const counter = document.getElementById('counter');
    const status = document.getElementById('status');
    const log = document.getElementById('log');
    const errors = document.getElementById('errors');

    const seen = new Set();
    let lastSeq = -1;
    let outOfOrder = false;
    let parseFail = 0;
    const startTs = Date.now();

    const es = new EventSource('/sse');

    function updateStatus() {
      const state = { 0: 'CONNECTING', 1: 'OPEN', 2: 'CLOSED' }[es.readyState] || 'UNKNOWN';
      const elapsed = ((Date.now() - startTs) / 1000).toFixed(1);
      status.textContent = `readyState=${es.readyState} (${state}) · elapsed=${elapsed}s · seen=${seen.size}/${total}` +
        (outOfOrder ? ' · OUT-OF-ORDER' : '') +
        (parseFail ? ` · parseFail=${parseFail}` : '');
    }

    es.addEventListener('open', () => {
      console.log('[sse] open');
      updateStatus();
    });

    es.addEventListener('tick', (e) => {
      let payload;
      try { payload = JSON.parse(e.data); }
      catch (err) { parseFail++; console.error('parse fail', e.data); updateStatus(); return; }
      const { seq, ts } = payload;
      if (seq <= lastSeq) outOfOrder = true;
      lastSeq = seq;
      seen.add(seq);
      counter.textContent = `${seen.size} / ${total}`;
      const li = document.createElement('li');
      li.textContent = `seq=${seq} ts=${ts} (latency=${Date.now() - ts}ms)`;
      log.appendChild(li);
      log.scrollTop = log.scrollHeight;
      console.log(`[sse] tick seq=${seq}`);
      updateStatus();
      if (seen.size === total) {
        const pass = !outOfOrder && parseFail === 0;
        counter.classList.add(pass ? 'pass' : 'fail');
        const summary = pass
          ? `GATE B PASS — ${total}/${total} events, in-order, no parse errors`
          : `GATE B FAIL — outOfOrder=${outOfOrder} parseFail=${parseFail}`;
        const li2 = document.createElement('li');
        li2.style.fontWeight = '500';
        li2.textContent = summary;
        log.appendChild(li2);
        window.__GATE_B_RESULT__ = { pass, seen: seen.size, total, outOfOrder, parseFail };
      }
    });

    es.addEventListener('done', () => {
      console.log('[sse] done');
      es.close();
      updateStatus();
    });

    es.addEventListener('error', (e) => {
      const msg = `[error] readyState=${es.readyState} at ${((Date.now() - startTs) / 1000).toFixed(1)}s`;
      errors.textContent = (errors.textContent ? errors.textContent + ' | ' : '') + msg;
      console.error('[sse] error', e);
      updateStatus();
    });

    setInterval(updateStatus, 1000);
  </script>
</body>
</html>
