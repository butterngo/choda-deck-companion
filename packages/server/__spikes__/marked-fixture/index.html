  <script>
    const md = document.getElementById('md').textContent;
    const html = marked.parse(md);
    const output = document.getElementById('output');
    output.innerHTML = html;

    function check(label, ok, detail) {
      return { label, ok: !!ok, detail: detail || '' };
    }

    const tables = output.querySelectorAll('table');
    const codeBlocks = output.querySelectorAll('pre code');
    const headings = {
      h1: output.querySelectorAll('h1').length,
      h2: output.querySelectorAll('h2').length,
      h3: output.querySelectorAll('h3').length,
    };
    let treeFound = false;
    output.querySelectorAll('pre').forEach(pre => {
      const t = pre.textContent;
      if (t.includes('├──') || t.includes('└──')) treeFound = true;
    });

    const results = [
      check('table render (>=1)', tables.length >= 1, `found ${tables.length}`),
      check('code block render (>=1)', codeBlocks.length >= 1, `found ${codeBlocks.length}`),
      check('tree listing inside <pre>', treeFound, treeFound ? 'found ├── / └──' : 'no tree chars'),
      check('heading hierarchy h1+h2+h3 present',
        headings.h1 >= 1 && headings.h2 >= 1 && headings.h3 >= 1,
        `h1=${headings.h1} h2=${headings.h2} h3=${headings.h3}`),
    ];

    const verify = document.getElementById('verify');
    const passed = results.filter(r => r.ok).length;
    const total = results.length;
    verify.innerHTML = `<h2>Auto-verify · ${passed}/${total}</h2>` +
      results.map(r => `<div class="${r.ok ? 'pass' : 'fail'}">${r.ok ? '[PASS]' : '[FAIL]'} ${r.label} — ${r.detail}</div>`).join('') +
      `<div class="summary ${passed === total ? 'pass' : 'fail'}">${passed === total ? 'GATE A PASS — marked@12.0.1 ready for Phase 2' : 'GATE A FAIL — spike alternative markdown lib'}</div>`;

    window.__GATE_A_RESULT__ = { passed, total, results };
  </script>
